name: ecare_patient
description: "E-Care 369 Patient Mobile App – Telemedicine platform for patients."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.10.0

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # State management
  flutter_bloc: ^8.1.3
  equatable: ^2.0.5

  # Dependency injection
  get_it: ^7.6.4

  # Networking
  dio: ^5.4.0
  pretty_dio_logger: ^1.3.1

  # Functional programming
  dartz: ^0.10.1

  # Secure storage
  flutter_secure_storage: ^9.0.0

  # Local storage
  shared_preferences: ^2.2.2

  # Hive (persistent cache)
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # Connectivity
  connectivity_plus: ^5.0.2
  internet_connection_checker: ^1.0.0+1

  # Image caching
  cached_network_image: ^3.3.0
  flutter_cache_manager: ^3.3.1

  # Routing
  auto_route: ^7.8.4

  # Serialization
  json_annotation: ^4.8.1

  # Utilities
  path_provider: ^2.1.1
  intl: ^0.18.1

  # Typography — Albert Sans (design system font)
  google_fonts: ^6.1.0

  # Real-time (SignalR) for queue / notifications / chat live events
  signalr_netcore: ^1.3.9

  # PDF receipt generation + share/print
  pdf: ^3.10.7
  printing: ^5.12.0

  # QR display for appointment number on the check-in screen
  qr_flutter: ^4.1.0

  # Deep links & external URL launching (attachments, result files)
  url_launcher: ^6.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.7
  auto_route_generator: ^7.3.2
  json_serializable: ^6.7.1
  hive_generator: ^2.0.1

flutter:
  uses-material-design: true
